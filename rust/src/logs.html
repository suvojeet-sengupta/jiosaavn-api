<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JioSaavn API Server Logs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0b0f19;
            --bg-surface: #151d30;
            --bg-element: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.15);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --accent: #06b6d4;
            --border: #334155;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Fira Code', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Password Modal Styling */
        #login-card {
            background-color: var(--bg-surface);
            padding: 2.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #login-card h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        #login-card p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .input-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--bg-element);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: var(--text-main);
            font-family: var(--font-sans);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        #error-msg {
            color: var(--danger);
            font-size: 0.875rem;
            margin-top: 1rem;
            display: none;
        }

        /* Logs Dashboard Layout */
        #dashboard {
            display: none;
            width: 100%;
            height: 100vh;
            grid-template-columns: 280px 1fr;
            animation: fadeIn 0.3s ease-out;
            position: relative;
        }

        /* Sidebar */
        aside {
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 30;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h1 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sidebar-header .tag {
            font-size: 0.7rem;
            background-color: var(--primary-glow);
            color: var(--primary);
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            font-weight: 600;
        }

        .close-sidebar-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
        }

        .file-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .file-list-container h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 0.65rem 0.85rem;
            border-radius: 0.375rem;
            cursor: pointer;
            margin-bottom: 0.35rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            transition: all 0.15s ease;
            font-family: var(--font-mono);
            border: 1px solid transparent;
        }

        .file-item:hover {
            background-color: var(--bg-element);
            color: var(--text-main);
        }

        .file-item.active {
            background-color: var(--primary-glow);
            color: var(--primary);
            border-color: rgba(59, 130, 246, 0.3);
            font-weight: 500;
        }

        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid var(--border);
        }

        /* Main Console Panel */
        main {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-base);
        }

        header {
            background-color: var(--bg-surface);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .controls-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .controls-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .search-wrapper {
            position: relative;
        }

        .search-input {
            padding: 0.5rem 1rem 0.5rem 2rem;
            background-color: var(--bg-element);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            color: var(--text-main);
            font-size: 0.875rem;
            width: 240px;
            outline: none;
            transition: width 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            width: 14px;
            height: 14px;
        }

        /* Status Indicator */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.3rem 0.6rem;
            border-radius: 9999px;
            background-color: var(--bg-element);
            color: var(--text-muted);
        }

        .status-badge.live {
            color: var(--success);
            background-color: rgba(16, 185, 129, 0.1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-muted);
        }

        .status-badge.live .status-dot {
            background-color: var(--success);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        .btn-secondary {
            background-color: var(--bg-element);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.5rem 0.85rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            transition: all 0.15s ease;
        }

        .btn-secondary:hover {
            background-color: var(--border);
        }

        .mobile-toggle {
            display: none;
        }

        /* Stats Bar */
        .stats-bar {
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 0.65rem 1.5rem;
            display: flex;
            gap: 2.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            overflow-x: auto;
            white-space: nowrap;
        }

        .stat-item strong {
            color: var(--text-main);
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }

        /* Console Output Container */
        .console-container {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            background-color: #060913;
        }

        .console-output {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            color: #d1d5db;
        }

        /* Highlighting Classes */
        .log-line {
            display: block;
            border-bottom: 1px solid #111827;
            padding: 0.15rem 0;
            transition: background-color 0.1s ease;
        }

        .log-line:hover {
            background-color: #111827;
        }

        .log-time {
            color: #6b7280;
            margin-right: 0.5rem;
        }

        .method-get { color: #3b82f6; font-weight: 600; }
        .method-post { color: #a855f7; font-weight: 600; }
        .status-2xx { color: var(--success); }
        .status-3xx { color: var(--warning); }
        .status-4xx { color: var(--danger); }
        .status-5xx { color: #f43f5e; font-weight: bold; }
        
        .log-cache-hit {
            color: var(--accent);
            background-color: rgba(6, 182, 212, 0.08);
            padding: 0 0.25rem;
            border-radius: 0.15rem;
        }
        
        .log-cache-miss {
            color: var(--warning);
            background-color: rgba(245, 158, 11, 0.08);
            padding: 0 0.25rem;
            border-radius: 0.15rem;
        }

        .log-cache-expired {
            color: #e2e8f0;
            background-color: rgba(226, 232, 240, 0.08);
            padding: 0 0.25rem;
            border-radius: 0.15rem;
        }

        .log-upstream {
            color: #10b981;
        }

        .duration-slow {
            color: var(--warning);
            font-weight: 500;
        }

        .duration-critical {
            color: var(--danger);
            font-weight: 600;
        }

        /* Sidebar Backdrop Overlay for Mobile */
        #backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 25;
            animation: fadeIn 0.2s ease;
        }

        /* 📱 Responsive Mobile Adjustments */
        @media (max-width: 768px) {
            #dashboard {
                grid-template-columns: 1fr;
            }

            aside {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 280px;
                transform: translateX(-100%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 10px 0 25px rgba(0, 0, 0, 0.5);
            }

            aside.open {
                transform: translateX(0);
            }

            .close-sidebar-btn {
                display: block;
            }

            .mobile-toggle {
                display: inline-flex;
            }

            header {
                padding: 0.75rem 1rem;
            }

            .search-input {
                width: 140px;
            }
            .search-input:focus {
                width: 180px;
            }

            .stats-bar {
                gap: 1.25rem;
                padding: 0.5rem 1rem;
            }

            .console-container {
                padding: 1rem;
            }

            .console-output {
                font-size: 0.75rem;
            }
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <!-- LOGIN CARD -->
    <div id="login-card">
        <h2>Logs Access Portal</h2>
        <p>Enter the administrator credentials to view real-time server activity.</p>
        
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="password">Server Password</label>
                <input type="password" id="password" class="input-control" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn">Authenticate</button>
            <div id="error-msg">Incorrect password. Please try again.</div>
        </form>
    </div>

    <!-- BACKDROP OVERLAY FOR MOBILE -->
    <div id="backdrop" onclick="closeSidebar()"></div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h1>JioSaavn API <span class="tag">Logs</span></h1>
                <button class="close-sidebar-btn" onclick="closeSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <div class="file-list-container">
                <h3>Log Files</h3>
                <div id="file-list">
                    <!-- File list loaded dynamically -->
                </div>
            </div>
            
            <div class="sidebar-footer">
                <button class="btn-secondary" style="width: 100%; justify-content: center;" onclick="logout()">
                    Logout
                </button>
            </div>
        </aside>

        <main>
            <header>
                <div class="controls-left">
                    <button class="btn-secondary mobile-toggle" onclick="openSidebar()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <span id="active-filename" style="font-family: var(--font-mono); font-weight: 600; font-size: 0.85rem; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                    <div id="connection-status" class="status-badge">
                        <div class="status-dot"></div>
                        <span id="status-text">Disconnected</span>
                    </div>
                </div>
                
                <div class="controls-right">
                    <div class="search-wrapper">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" id="search-filter" class="search-input" placeholder="Filter..." oninput="applyFilter()">
                    </div>

                    <button class="btn-secondary" onclick="downloadLogs()" title="Download Log File">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    </button>
                </div>
            </header>

            <!-- STATS BAR -->
            <div class="stats-bar">
                <div class="stat-item">Total Requests: <strong id="stat-total">0</strong></div>
                <div class="stat-item">Cache Hit Rate: <strong id="stat-cache-rate">0%</strong></div>
                <div class="stat-item">Avg Latency: <strong id="stat-latency">0ms</strong></div>
                <div class="stat-item">Error Rate: <strong id="stat-errors">0%</strong></div>
            </div>

            <!-- CONSOLE CONTAINER -->
            <div class="console-container" id="console-scroll">
                <div class="console-output" id="log-output">Select a log file on the left side to get started.</div>
            </div>
        </main>
    </div>

    <script>
        let logsPassword = localStorage.getItem('logs_password') || '';
        let activeFile = '';
        let originalLogLines = [];
        let ws = null;
        let reconnectTimeout = null;

        // Check if already authenticated on load
        if (logsPassword) {
            testAuthAndInitialize();
        }

        async function handleLogin(e) {
            e.preventDefault();
            const passwordInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.style.display = 'none';

            // Set logsPassword first so inner loadFileList and WS calls use it
            logsPassword = passwordInput;

            const success = await loadFileList(passwordInput);
            if (success) {
                localStorage.setItem('logs_password', logsPassword);
                
                document.getElementById('login-card').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('password').value = '';
                logsPassword = '';
            }
        }

        async function testAuthAndInitialize() {
            const success = await loadFileList(logsPassword);
            if (success) {
                document.getElementById('login-card').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';
            } else {
                localStorage.removeItem('logs_password');
                logsPassword = '';
            }
        }

        function logout() {
            localStorage.removeItem('logs_password');
            logsPassword = '';
            if (ws) ws.close();
            location.reload();
        }

        // Mobile Sidebar controls
        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('backdrop').style.display = 'block';
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('backdrop').style.display = 'none';
        }

        async function loadFileList(pwd) {
            try {
                const response = await fetch('/api/logs/files', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwd })
                });

                if (!response.ok) return false;

                const result = await response.json();
                if (!result.success) return false;

                const files = result.data || [];
                const listContainer = document.getElementById('file-list');
                listContainer.innerHTML = '';

                if (files.length === 0) {
                    listContainer.innerHTML = '<div style="color: var(--text-muted); font-size: 0.85rem; padding: 0.5rem;">No log files found</div>';
                    return true;
                }

                files.forEach((file, index) => {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.innerText = file;
                    item.onclick = () => {
                        selectFile(file, item);
                        closeSidebar();
                    };
                    listContainer.appendChild(item);

                    // Auto select the first file (usually the latest one)
                    if (index === 0 && !activeFile) {
                        selectFile(file, item);
                    } else if (file === activeFile) {
                        item.classList.add('active');
                    }
                });

                return true;
            } catch (err) {
                console.error("Error loading file list:", err);
                return false;
            }
        }

        function selectFile(filename, element) {
            // Remove active status from all
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
            
            activeFile = filename;
            element.classList.add('active');
            document.getElementById('active-filename').innerText = filename;

            // Connect to WebSocket stream for this file
            connectLogsWs();
        }

        function updateConnectionStatus(status) {
            const badge = document.getElementById('connection-status');
            const text = document.getElementById('status-text');

            if (status === 'live') {
                badge.className = 'status-badge live';
                text.innerText = 'Live Streaming';
            } else if (status === 'history') {
                badge.className = 'status-badge';
                text.innerText = 'Static History';
            } else if (status === 'connecting') {
                badge.className = 'status-badge';
                text.innerText = 'Connecting...';
            } else {
                badge.className = 'status-badge';
                text.innerText = 'Disconnected';
            }
        }

        function connectLogsWs() {
            if (!activeFile) return;

            // Close existing socket
            if (ws) {
                ws.close();
                ws = null;
            }
            if (reconnectTimeout) {
                clearTimeout(reconnectTimeout);
                reconnectTimeout = null;
            }

            updateConnectionStatus('connecting');

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/api/logs/ws?password=${encodeURIComponent(logsPassword)}&file_name=${encodeURIComponent(activeFile)}`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                // Determine if this is today's log file (if it is, status is 'live', else 'history')
                // Note: The server will close subscription if not today's log file, but keeps connection open to send dump
                const todayStr = new Date().toISOString().split('T')[0];
                if (activeFile.includes(todayStr)) {
                    updateConnectionStatus('live');
                } else {
                    updateConnectionStatus('history');
                }
            };

            ws.onmessage = (event) => {
                const message = event.data;

                if (message.startsWith('[INITIAL_DUMP]\n')) {
                    // This is the history payload of the file
                    const content = message.slice(15);
                    originalLogLines = content.split('\n').filter(line => line.trim() !== '');
                    applyFilter();
                } else {
                    // This is a live streamed log line!
                    const isScrollAtBottom = checkIsScrollAtBottom();
                    
                    originalLogLines.push(message);
                    
                    const query = document.getElementById('search-filter').value.toLowerCase().trim();
                    if (!query || message.toLowerCase().includes(query)) {
                        const outputContainer = document.getElementById('log-output');
                        
                        // If it was empty or showing error
                        if (outputContainer.innerText.startsWith('Select a') || outputContainer.innerText.startsWith('Failed to')) {
                            outputContainer.innerHTML = '';
                        }
                        
                        const div = document.createElement('div');
                        div.innerHTML = formatLogLine(message);
                        // Extract log-line child node
                        const node = div.firstChild;
                        outputContainer.appendChild(node);
                    }

                    // Recalculate stats dynamically
                    calculateStats(originalLogLines);

                    if (isScrollAtBottom) {
                        scrollToBottom();
                    }
                }
            };

            ws.onclose = (event) => {
                // If closed due to unauthorized, logout
                if (event.code === 4001 || event.reason.includes('Unauthorized')) {
                    logout();
                    return;
                }

                updateConnectionStatus('disconnected');

                // Try to reconnect in 5 seconds if it's today's live file
                const todayStr = new Date().toISOString().split('T')[0];
                if (activeFile.includes(todayStr)) {
                    reconnectTimeout = setTimeout(() => {
                        connectLogsWs();
                    }, 5000);
                }
            };

            ws.onerror = (error) => {
                console.error("WebSocket error:", error);
            };
        }

        function applyFilter() {
            const query = document.getElementById('search-filter').value.toLowerCase().trim();
            const outputContainer = document.getElementById('log-output');
            
            const isScrollAtBottom = checkIsScrollAtBottom();

            let matchedLines = originalLogLines;
            if (query) {
                matchedLines = originalLogLines.filter(line => line.toLowerCase().includes(query));
            }

            // Calculate stats on all parsed lines
            calculateStats(originalLogLines);

            if (matchedLines.length === 0) {
                outputContainer.innerHTML = '<span style="color: var(--text-muted);">No matching log entries found.</span>';
                return;
            }

            const formattedHtml = matchedLines.map(line => formatLogLine(line)).join('');
            outputContainer.innerHTML = formattedHtml;

            if (isScrollAtBottom) {
                scrollToBottom();
            }
        }

        function formatLogLine(line) {
            let lineClass = "log-line";
            
            if (line.includes("[CACHE HIT]")) {
                return `<span class="${lineClass} log-cache-hit">${escapeHtml(line)}</span>`;
            }
            if (line.includes("[CACHE MISS]")) {
                return `<span class="${lineClass} log-cache-miss">${escapeHtml(line)}</span>`;
            }
            if (line.includes("[CACHE EXPIRED]")) {
                return `<span class="${lineClass} log-cache-expired">${escapeHtml(line)}</span>`;
            }
            if (line.includes("[UPSTREAM FETCH SUCCESS]")) {
                return `<span class="${lineClass} log-upstream">${escapeHtml(line)}</span>`;
            }

            // Parse request log
            const parts = line.split(' ');
            if (parts.length >= 5) {
                const time = parts[0] + ' ' + parts[1]; // [YYYY-MM-DD HH:MM:SS]
                const method = parts[2];
                const uri = parts[3];
                const status = parts[4];
                const duration = parts[5]; // e.g. 45ms

                let methodSpan = `<span class="method-${method.toLowerCase()}">${escapeHtml(method)}</span>`;
                
                let statusGroup = status[0];
                let statusSpan = `<span class="status-${statusGroup}xx">${escapeHtml(status)}</span>`;

                let durationSpan = '';
                if (duration) {
                    const durMs = parseInt(duration);
                    if (durMs > 1000) {
                        durationSpan = `<span class="duration-critical">${escapeHtml(duration)}</span>`;
                    } else if (durMs > 300) {
                        durationSpan = `<span class="duration-slow">${escapeHtml(duration)}</span>`;
                    } else {
                        durationSpan = `<span style="color: #6b7280">${escapeHtml(duration)}</span>`;
                    }
                }

                return `<span class="${lineClass}"><span class="log-time">${escapeHtml(time)}</span> ${methodSpan} <span style="color: #e5e7eb">${escapeHtml(uri)}</span> ${statusSpan} ${durationSpan}</span>`;
            }

            return `<span class="${lineClass}">${escapeHtml(line)}</span>`;
        }

        function calculateStats(lines) {
            let totalRequests = 0;
            let cacheHits = 0;
            let totalLatency = 0;
            let latencyCount = 0;
            let errors = 0;

            lines.forEach(line => {
                if (line.includes("[CACHE HIT]")) {
                    cacheHits++;
                }

                const parts = line.split(' ');
                if (parts.length >= 5 && parts[0].startsWith('[')) {
                    totalRequests++;
                    
                    const status = parts[4];
                    if (status.startsWith('4') || status.startsWith('5')) {
                        errors++;
                    }

                    const duration = parts[5];
                    if (duration && duration.endsWith('ms')) {
                        const ms = parseInt(duration);
                        if (!isNaN(ms)) {
                            totalLatency += ms;
                            latencyCount++;
                        }
                    }
                }
            });

            let cacheMisses = lines.filter(l => l.includes("[CACHE MISS]")).length;
            let hitRate = 0;
            if (cacheHits + cacheMisses > 0) {
                hitRate = Math.round((cacheHits / (cacheHits + cacheMisses)) * 100);
            }

            const avgLatency = latencyCount > 0 ? Math.round(totalLatency / latencyCount) : 0;
            const errorRate = totalRequests > 0 ? Math.round((errors / totalRequests) * 100) : 0;

            document.getElementById('stat-total').innerText = totalRequests;
            document.getElementById('stat-cache-rate').innerText = hitRate + '%';
            document.getElementById('stat-latency').innerText = avgLatency + 'ms';
            document.getElementById('stat-errors').innerText = errorRate + '%';
        }

        function checkIsScrollAtBottom() {
            const el = document.getElementById('console-scroll');
            return (el.scrollHeight - el.scrollTop - el.clientHeight) < 80;
        }

        function scrollToBottom() {
            const el = document.getElementById('console-scroll');
            el.scrollTop = el.scrollHeight;
        }

        function downloadLogs() {
            if (!activeFile || originalLogLines.length === 0) return;
            const text = originalLogLines.join('\n');
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = activeFile;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
