name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          # If your SSH port is not 22, uncomment the line below and set it
          # port: ${{ secrets.VPS_PORT }}
          script: |
            # Navigate to the project directory on your VPS.
            # IMPORTANT: Change '/path/to/hqaudio-api' to the actual path on your server!
            cd /path/to/hqaudio-api
            
            # Pull the latest changes
            git pull origin main
            
            # Rebuild and restart the application using docker-compose
            docker-compose up -d --build
